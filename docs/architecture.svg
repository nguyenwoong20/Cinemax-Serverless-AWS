<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 560" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#444"/>
    </marker>
  </defs>

  <rect width="980" height="560" fill="#ffffff"/>
  <text x="490" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#232f3e">Cinemax Serverless API — Architecture</text>

  <!-- AWS Cloud boundary -->
  <rect x="250" y="60" width="700" height="460" rx="10" fill="#f7f7f7" stroke="#ff9900" stroke-width="2" stroke-dasharray="8 4"/>
  <text x="270" y="86" font-size="15" font-weight="bold" fill="#ff9900">AWS Cloud (ap-southeast-1)</text>

  <!-- Flutter app -->
  <rect x="30" y="220" width="160" height="110" rx="10" fill="#e8f4fd" stroke="#1a73e8" stroke-width="2"/>
  <text x="110" y="265" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a73e8">Cinemax</text>
  <text x="110" y="285" text-anchor="middle" font-size="13" fill="#333">Flutter App</text>
  <text x="110" y="305" text-anchor="middle" font-size="11" fill="#666">(mobile client)</text>

  <!-- API Gateway -->
  <rect x="300" y="215" width="170" height="120" rx="8" fill="#fff" stroke="#a166ff" stroke-width="2.5"/>
  <text x="385" y="258" text-anchor="middle" font-size="14" font-weight="bold" fill="#7d3bd6">Amazon</text>
  <text x="385" y="276" text-anchor="middle" font-size="14" font-weight="bold" fill="#7d3bd6">API Gateway</text>
  <text x="385" y="300" text-anchor="middle" font-size="11" fill="#666">REST API · stage: prod</text>
  <text x="385" y="316" text-anchor="middle" font-size="11" fill="#666">CORS enabled</text>

  <!-- Lambda movies -->
  <rect x="540" y="120" width="180" height="95" rx="8" fill="#fff" stroke="#ff9900" stroke-width="2.5"/>
  <text x="630" y="155" text-anchor="middle" font-size="14" font-weight="bold" fill="#cc7a00">AWS Lambda</text>
  <text x="630" y="175" text-anchor="middle" font-size="12" fill="#333">cinemax-movies</text>
  <text x="630" y="193" text-anchor="middle" font-size="11" fill="#666">CRUD + search · Node.js 22</text>

  <!-- Lambda bookmarks -->
  <rect x="540" y="330" width="180" height="95" rx="8" fill="#fff" stroke="#ff9900" stroke-width="2.5"/>
  <text x="630" y="365" text-anchor="middle" font-size="14" font-weight="bold" fill="#cc7a00">AWS Lambda</text>
  <text x="630" y="385" text-anchor="middle" font-size="12" fill="#333">cinemax-bookmarks</text>
  <text x="630" y="403" text-anchor="middle" font-size="11" fill="#666">add / list / remove</text>

  <!-- DynamoDB movies -->
  <rect x="780" y="120" width="150" height="95" rx="8" fill="#fff" stroke="#3b48cc" stroke-width="2.5"/>
  <text x="855" y="155" text-anchor="middle" font-size="13" font-weight="bold" fill="#3b48cc">DynamoDB</text>
  <text x="855" y="175" text-anchor="middle" font-size="12" fill="#333">cinemax-movies</text>
  <text x="855" y="193" text-anchor="middle" font-size="10" fill="#666">GSI: category-createdAt</text>

  <!-- DynamoDB bookmarks -->
  <rect x="780" y="330" width="150" height="95" rx="8" fill="#fff" stroke="#3b48cc" stroke-width="2.5"/>
  <text x="855" y="365" text-anchor="middle" font-size="13" font-weight="bold" fill="#3b48cc">DynamoDB</text>
  <text x="855" y="385" text-anchor="middle" font-size="12" fill="#333">cinemax-bookmarks</text>
  <text x="855" y="403" text-anchor="middle" font-size="10" fill="#666">PK: userId · SK: movieId</text>

  <!-- S3 -->
  <rect x="300" y="420" width="170" height="80" rx="8" fill="#fff" stroke="#1b9e4b" stroke-width="2.5"/>
  <text x="385" y="452" text-anchor="middle" font-size="13" font-weight="bold" fill="#1b9e4b">Amazon S3</text>
  <text x="385" y="470" text-anchor="middle" font-size="11" fill="#333">cinemax-posters</text>
  <text x="385" y="486" text-anchor="middle" font-size="10" fill="#666">public read: posters/* only</text>

  <!-- CloudWatch -->
  <rect x="540" y="450" width="180" height="55" rx="8" fill="#fff" stroke="#e0457b" stroke-width="2.5"/>
  <text x="630" y="473" text-anchor="middle" font-size="13" font-weight="bold" fill="#e0457b">Amazon CloudWatch</text>
  <text x="630" y="491" text-anchor="middle" font-size="10" fill="#666">logs · metrics · 5XX alarm</text>

  <!-- Arrows -->
  <line x1="190" y1="275" x2="295" y2="275" stroke="#444" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="242" y="265" text-anchor="middle" font-size="11" fill="#444">HTTPS / JSON</text>

  <line x1="470" y1="245" x2="535" y2="180" stroke="#444" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="495" y="200" text-anchor="middle" font-size="10" fill="#444">/movies</text>

  <line x1="470" y1="305" x2="535" y2="365" stroke="#444" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="478" y="350" text-anchor="middle" font-size="10" fill="#444">/bookmarks</text>

  <line x1="720" y1="167" x2="775" y2="167" stroke="#444" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="720" y1="377" x2="775" y2="377" stroke="#444" stroke-width="2" marker-end="url(#arrow)"/>

  <line x1="110" y1="330" x2="110" y2="460" stroke="#1b9e4b" stroke-width="2" stroke-dasharray="5 3"/>
  <line x1="110" y1="460" x2="295" y2="460" stroke="#1b9e4b" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
  <text x="180" y="450" text-anchor="middle" font-size="10" fill="#1b9e4b">GET posters (HTTPS)</text>

  <line x1="630" y1="215" x2="630" y2="325" stroke="#e0457b" stroke-width="1.5" stroke-dasharray="3 3"/>
  <line x1="630" y1="425" x2="630" y2="445" stroke="#e0457b" stroke-width="1.5" stroke-dasharray="3 3" marker-end="url(#arrow)"/>
  <text x="652" y="295" font-size="10" fill="#e0457b">logs</text>
</svg>
