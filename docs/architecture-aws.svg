<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1320 940" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#232f3e"/></marker>
    <marker id="ahp" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#E7157B"/></marker>
    <marker id="ahr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#D93025"/></marker>
    <marker id="ahg" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#7AA116"/></marker>
    <marker id="ahb" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#C7511F"/></marker>
  </defs>

  <rect width="1320" height="940" fill="#ffffff"/>
  <text x="660" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#232f3e">Cinemax — Full Serverless Architecture on AWS</text>

  <!-- AWS Cloud frame -->
  <rect x="195" y="50" width="1100" height="800" fill="none" stroke="#232f3e" stroke-width="1.5"/>
  <rect x="195" y="50" width="28" height="28" fill="#232f3e"/>
  <text x="209" y="69" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">aws</text>
  <text x="231" y="69" font-size="13" font-weight="bold" fill="#232f3e">AWS Cloud</text>

  <!-- Region -->
  <rect x="225" y="100" width="1040" height="720" fill="none" stroke="#147EBA" stroke-width="1.2" stroke-dasharray="6 4"/>
  <rect x="225" y="100" width="22" height="22" fill="#147EBA"/>
  <path d="M 232 105 v 12 M 232 105 h 8 l -2.5 3 l 2.5 3 h -8" stroke="#fff" stroke-width="1.3" fill="none"/>
  <text x="254" y="116" font-size="12" font-weight="bold" fill="#147EBA">ap-southeast-1 (Singapore)</text>

  <!-- Client -->
  <rect x="30" y="330" width="130" height="120" fill="#fff" stroke="#232f3e" stroke-width="1.3"/>
  <circle cx="95" cy="368" r="16" fill="none" stroke="#232f3e" stroke-width="2"/>
  <path d="M 72 408 a 23 16 0 0 1 46 0" fill="none" stroke="#232f3e" stroke-width="2"/>
  <text x="95" y="430" text-anchor="middle" font-size="12" font-weight="bold" fill="#232f3e">Cinemax App</text>
  <text x="95" y="444" text-anchor="middle" font-size="10" fill="#555">(Flutter · Android)</text>

  <!-- API Gateway REST -->
  <rect x="280" y="240" width="56" height="56" rx="5" fill="#8C4FFF"/>
  <path d="M 296 260 l -7 8 l 7 8 M 320 260 l 7 8 l -7 8 M 312 256 l -8 24" stroke="#fff" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="308" y="312" text-anchor="middle" font-size="11" font-weight="bold" fill="#232f3e">API Gateway</text>
  <text x="308" y="325" text-anchor="middle" font-size="9.5" fill="#555">REST · /api/*</text>

  <!-- API Gateway WebSocket -->
  <rect x="280" y="500" width="56" height="56" rx="5" fill="#8C4FFF"/>
  <path d="M 293 528 q 7 -12 15 0 q 8 12 15 0" stroke="#fff" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <circle cx="293" cy="528" r="2.5" fill="#fff"/><circle cx="323" cy="528" r="2.5" fill="#fff"/>
  <text x="308" y="572" text-anchor="middle" font-size="11" font-weight="bold" fill="#232f3e">API Gateway</text>
  <text x="308" y="585" text-anchor="middle" font-size="9.5" fill="#555">WebSocket · realtime</text>

  <!-- Lambda column -->
  <!-- movies -->
  <rect x="520" y="140" width="52" height="52" rx="5" fill="#ED7100"/>
  <text x="546" y="176" text-anchor="middle" font-size="27" font-weight="bold" fill="#fff" font-family="Georgia, serif">&#955;</text>
  <text x="606" y="158" font-size="11" font-weight="bold" fill="#232f3e">cinemax-movies</text>
  <text x="606" y="172" font-size="9" fill="#555">catalog · search · filter · hot · cast</text>
  <text x="606" y="184" font-size="9" fill="#555">on-demand ingest (kho tự lớn)</text>

  <!-- auth -->
  <rect x="520" y="240" width="52" height="52" rx="5" fill="#ED7100"/>
  <text x="546" y="276" text-anchor="middle" font-size="27" font-weight="bold" fill="#fff" font-family="Georgia, serif">&#955;</text>
  <text x="606" y="258" font-size="11" font-weight="bold" fill="#232f3e">cinemax-auth</text>
  <text x="606" y="272" font-size="9" fill="#555">register · OTP · login · Google · JWT</text>
  <text x="606" y="284" font-size="9" fill="#555">profile update · avatar to S3</text>

  <!-- social -->
  <rect x="520" y="340" width="52" height="52" rx="5" fill="#ED7100"/>
  <text x="546" y="376" text-anchor="middle" font-size="27" font-weight="bold" fill="#fff" font-family="Georgia, serif">&#955;</text>
  <text x="606" y="358" font-size="11" font-weight="bold" fill="#232f3e">cinemax-social</text>
  <text x="606" y="372" font-size="9" fill="#555">bookmarks · saved · comments</text>
  <text x="606" y="384" font-size="9" fill="#555">profanity filter (loc tu bay)</text>

  <!-- watchrooms REST -->
  <rect x="520" y="440" width="52" height="52" rx="5" fill="#ED7100"/>
  <text x="546" y="476" text-anchor="middle" font-size="27" font-weight="bold" fill="#fff" font-family="Georgia, serif">&#955;</text>
  <text x="606" y="458" font-size="11" font-weight="bold" fill="#232f3e">cinemax-watchrooms</text>
  <text x="606" y="472" font-size="9" fill="#555">create / join / close room (REST)</text>

  <!-- watchroom ws -->
  <rect x="520" y="530" width="52" height="52" rx="5" fill="#ED7100"/>
  <text x="546" y="566" text-anchor="middle" font-size="27" font-weight="bold" fill="#fff" font-family="Georgia, serif">&#955;</text>
  <text x="606" y="548" font-size="11" font-weight="bold" fill="#232f3e">cinemax-watchroom-ws</text>
  <text x="606" y="562" font-size="9" fill="#555">sync play/pause/seek · chat phong</text>

  <!-- sync -->
  <rect x="520" y="660" width="52" height="52" rx="5" fill="#ED7100"/>
  <text x="546" y="696" text-anchor="middle" font-size="27" font-weight="bold" fill="#fff" font-family="Georgia, serif">&#955;</text>
  <text x="606" y="678" font-size="11" font-weight="bold" fill="#232f3e">cinemax-sync</text>
  <text x="606" y="692" font-size="9" fill="#555">phim moi moi dem tu kkphim</text>

  <!-- EventBridge -->
  <rect x="300" y="658" width="52" height="52" rx="5" fill="#E7157B"/>
  <circle cx="326" cy="684" r="13" fill="none" stroke="#fff" stroke-width="2"/>
  <path d="M 326 676 v 8 l 5 4" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 326 666 v -3 M 326 702 v 3 M 308 684 h 3 M 341 684 h 3" stroke="#fff" stroke-width="1.6"/>
  <text x="326" y="726" text-anchor="middle" font-size="11" font-weight="bold" fill="#232f3e">EventBridge</text>
  <text x="326" y="739" text-anchor="middle" font-size="9.5" fill="#555">cron 02:00 hang dem</text>

  <!-- DynamoDB group -->
  <rect x="850" y="170" width="56" height="56" rx="5" fill="#C925D1"/>
  <ellipse cx="878" cy="186" rx="13" ry="5" fill="none" stroke="#fff" stroke-width="2"/>
  <path d="M 865 186 v 22 a 13 5 0 0 0 26 0 v -22 M 865 197 a 13 5 0 0 0 26 0" fill="none" stroke="#fff" stroke-width="2"/>
  <text x="940" y="182" font-size="11.5" font-weight="bold" fill="#232f3e">Amazon DynamoDB — 7 bang</text>
  <text x="940" y="197" font-size="9.5" fill="#555">movies (GSI: slug, category) · users (PK email)</text>
  <text x="940" y="210" font-size="9.5" fill="#555">bookmarks · saved-movies · comments</text>
  <text x="940" y="223" font-size="9.5" fill="#555">rooms · connections (WebSocket)</text>

  <!-- S3 -->
  <rect x="850" y="330" width="56" height="56" rx="5" fill="#7AA116"/>
  <path d="M 866 346 a 12 4.5 0 0 0 24 0 a 12 4.5 0 0 0 -24 0 m 0 0 l 3 26 a 9 3.5 0 0 0 18 0 l 3 -26" fill="none" stroke="#fff" stroke-width="2"/>
  <text x="940" y="348" font-size="11.5" font-weight="bold" fill="#232f3e">Amazon S3</text>
  <text x="940" y="363" font-size="9.5" fill="#555">500+ poster &amp; thumbnail · avatar nguoi dung</text>
  <text x="940" y="376" font-size="9.5" fill="#555">public read: posters/* only</text>

  <!-- CloudWatch -->
  <rect x="850" y="470" width="56" height="56" rx="5" fill="#E7157B"/>
  <circle cx="878" cy="498" r="14" fill="none" stroke="#fff" stroke-width="2"/>
  <path d="M 878 490 v 8 l 6 4" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round"/>
  <text x="940" y="490" font-size="11.5" font-weight="bold" fill="#232f3e">Amazon CloudWatch</text>
  <text x="940" y="505" font-size="9.5" fill="#555">logs cua 6 Lambda · metrics · 5XX alarm</text>

  <!-- External services (outside frame, right) -->
  <rect x="1080" y="640" width="170" height="54" fill="#fff" stroke="#C7511F" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="1165" y="662" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#C7511F">kkphim API (phimapi.com)</text>
  <text x="1165" y="678" text-anchor="middle" font-size="9.5" fill="#555">nguon phim · tim kiem · chi tiet</text>

  <rect x="1080" y="712" width="170" height="48" fill="#fff" stroke="#0d253f" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="1165" y="732" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#0d253f">TMDB API</text>
  <text x="1165" y="747" text-anchor="middle" font-size="9.5" fill="#555">anh dien vien · diem rating</text>

  <rect x="1080" y="778" width="170" height="48" fill="#fff" stroke="#D93025" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="1165" y="798" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#D93025">Gmail SMTP</text>
  <text x="1165" y="813" text-anchor="middle" font-size="9.5" fill="#555">email OTP xac minh</text>

  <!-- ===== Arrows ===== -->
  <!-- client -> REST GW -->
  <polyline points="160,360 308,360 308,301" fill="none" stroke="#232f3e" stroke-width="1.4" marker-end="url(#ah)"/>
  <text x="200" y="350" font-size="9.5" fill="#555">HTTPS / JSON</text>
  <!-- client <-> WS GW -->
  <polyline points="160,420 308,420 308,495" fill="none" stroke="#232f3e" stroke-width="1.4" marker-end="url(#ah)" marker-start="url(#ah)"/>
  <text x="200" y="412" font-size="9.5" fill="#555">wss (xem chung)</text>

  <!-- REST GW -> lambdas -->
  <path d="M 336 258 L 515 172" stroke="#232f3e" stroke-width="1.3" fill="none" marker-end="url(#ah)"/>
  <line x1="336" y1="268" x2="515" y2="266" stroke="#232f3e" stroke-width="1.3" marker-end="url(#ah)"/>
  <path d="M 336 282 L 515 360" stroke="#232f3e" stroke-width="1.3" fill="none" marker-end="url(#ah)"/>
  <path d="M 336 292 L 515 458" stroke="#232f3e" stroke-width="1.3" fill="none" marker-end="url(#ah)"/>
  <!-- WS GW <-> ws lambda -->
  <line x1="336" y1="540" x2="515" y2="552" stroke="#232f3e" stroke-width="1.3" marker-end="url(#ah)" marker-start="url(#ah)"/>

  <!-- lambdas -> dynamodb (bus line x=800) -->
  <polyline points="572,166 800,166 800,190 845,190" fill="none" stroke="#232f3e" stroke-width="1.2" marker-end="url(#ah)"/>
  <polyline points="572,266 800,266 800,206" fill="none" stroke="#232f3e" stroke-width="1.2"/>
  <polyline points="572,366 800,366 800,226" fill="none" stroke="#232f3e" stroke-width="1.2"/>
  <polyline points="572,466 800,466 800,386" fill="none" stroke="#232f3e" stroke-width="1.2"/>
  <polyline points="572,556 800,556 800,486" fill="none" stroke="#232f3e" stroke-width="1.2"/>
  <polyline points="572,686 800,686 800,586" fill="none" stroke="#232f3e" stroke-width="1.2"/>

  <!-- movies/auth/sync -> S3 -->
  <polyline points="820,330 845,355" fill="none" stroke="#7AA116" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#ahg)"/>
  <text x="780" y="322" font-size="9" fill="#7AA116">poster · avatar</text>

  <!-- EventBridge -> sync -->
  <line x1="352" y1="684" x2="515" y2="686" stroke="#E7157B" stroke-width="1.4" marker-end="url(#ahp)"/>
  <text x="430" y="676" text-anchor="middle" font-size="9.5" fill="#E7157B">trigger</text>

  <!-- sync & movies -> kkphim -->
  <polyline points="572,700 1040,700 1040,667 1075,667" fill="none" stroke="#C7511F" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#ahb)"/>
  <text x="830" y="693" font-size="9" fill="#C7511F">lay phim moi / tim kiem fallback</text>

  <!-- movies -> tmdb -->
  <polyline points="640,196 660,196 660,620 1060,620 1060,736 1075,736" fill="none" stroke="#0d253f" stroke-width="1.1" stroke-dasharray="4 3" marker-end="url(#ah)"/>

  <!-- auth -> gmail -->
  <polyline points="546,292 546,320 490,320 490,802 1075,802" fill="none" stroke="#D93025" stroke-width="1.1" stroke-dasharray="4 3" marker-end="url(#ahr)"/>
  <text x="700" y="795" font-size="9" fill="#D93025">send OTP</text>

  <!-- lambdas -> cloudwatch -->
  <polyline points="878,530 878,560 830,560 830,610 878,610" fill="none" stroke="#E7157B" stroke-width="0" />
  <polyline points="700,610 878,610 878,531" fill="none" stroke="#E7157B" stroke-width="1.1" stroke-dasharray="3 3" marker-end="url(#ahp)"/>
  <text x="740" y="603" font-size="9" fill="#E7157B">logs tu tat ca Lambda</text>
</svg>
