<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#232f3e"/>
    </marker>
    <marker id="ahg" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7AA116"/>
    </marker>
    <marker id="ahp" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#E7157B"/>
    </marker>
    <marker id="ahr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#D93025"/>
    </marker>
  </defs>

  <rect width="1200" height="820" fill="#ffffff"/>
  <text x="600" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#232f3e">Cinemax Serverless API — Architecture</text>

  <!-- AWS Cloud frame -->
  <rect x="170" y="40" width="1000" height="660" fill="none" stroke="#232f3e" stroke-width="1.5"/>
  <rect x="170" y="40" width="30" height="30" fill="#232f3e"/>
  <text x="185" y="60" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">aws</text>
  <text x="208" y="60" font-size="13" font-weight="bold" fill="#232f3e">AWS Cloud</text>

  <!-- Region frame -->
  <rect x="210" y="95" width="920" height="560" fill="none" stroke="#147EBA" stroke-width="1.2" stroke-dasharray="6 4"/>
  <rect x="210" y="95" width="24" height="24" fill="#147EBA"/>
  <path d="M 218 101 v 12 M 218 101 h 8 l -2.5 3 l 2.5 3 h -8" stroke="#ffffff" stroke-width="1.4" fill="none"/>
  <text x="242" y="112" font-size="12" font-weight="bold" fill="#147EBA">ap-southeast-1 (Singapore)</text>

  <!-- Clients -->
  <rect x="25" y="352" width="110" height="56" fill="#ffffff" stroke="#232f3e" stroke-width="1.3"/>
  <text x="80" y="375" text-anchor="middle" font-size="12" font-weight="bold" fill="#232f3e">Cinemax App</text>
  <text x="80" y="392" text-anchor="middle" font-size="10.5" fill="#555">(Flutter client)</text>

  <!-- API Gateway icon -->
  <rect x="292" y="352" width="56" height="56" rx="5" fill="#8C4FFF"/>
  <path d="M 308 372 l -7 8 l 7 8 M 332 372 l 7 8 l -7 8 M 324 368 l -8 24" stroke="#ffffff" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="320" y="424" text-anchor="middle" font-size="11" font-weight="bold" fill="#232f3e">Amazon API Gateway</text>
  <text x="320" y="438" text-anchor="middle" font-size="9.5" fill="#555">REST API · stage prod</text>

  <!-- Lambda movies -->
  <rect x="542" y="162" width="56" height="56" rx="5" fill="#ED7100"/>
  <text x="570" y="200" text-anchor="middle" font-size="30" font-weight="bold" fill="#ffffff" font-family="Georgia, serif">&#955;</text>
  <text x="570" y="234" text-anchor="middle" font-size="11" font-weight="bold" fill="#232f3e">Lambda</text>
  <text x="570" y="248" text-anchor="middle" font-size="9.5" fill="#555">cinemax-movies</text>

  <!-- Lambda auth -->
  <rect x="542" y="352" width="56" height="56" rx="5" fill="#ED7100"/>
  <text x="570" y="390" text-anchor="middle" font-size="30" font-weight="bold" fill="#ffffff" font-family="Georgia, serif">&#955;</text>
  <text x="570" y="424" text-anchor="middle" font-size="11" font-weight="bold" fill="#232f3e">Lambda</text>
  <text x="570" y="438" text-anchor="middle" font-size="9.5" fill="#555">cinemax-auth</text>

  <!-- Lambda bookmarks -->
  <rect x="542" y="532" width="56" height="56" rx="5" fill="#ED7100"/>
  <text x="570" y="570" text-anchor="middle" font-size="30" font-weight="bold" fill="#ffffff" font-family="Georgia, serif">&#955;</text>
  <text x="570" y="604" text-anchor="middle" font-size="11" font-weight="bold" fill="#232f3e">Lambda</text>
  <text x="570" y="618" text-anchor="middle" font-size="9.5" fill="#555">cinemax-bookmarks</text>

  <!-- DynamoDB movies -->
  <rect x="812" y="162" width="56" height="56" rx="5" fill="#C925D1"/>
  <ellipse cx="840" cy="178" rx="13" ry="5" fill="none" stroke="#ffffff" stroke-width="2"/>
  <path d="M 827 178 v 22 a 13 5 0 0 0 26 0 v -22 M 827 189 a 13 5 0 0 0 26 0" fill="none" stroke="#ffffff" stroke-width="2"/>
  <text x="840" y="234" text-anchor="middle" font-size="11" font-weight="bold" fill="#232f3e">DynamoDB</text>
  <text x="840" y="248" text-anchor="middle" font-size="9.5" fill="#555">cinemax-movies · GSI: slug, category</text>

  <!-- DynamoDB users -->
  <rect x="812" y="352" width="56" height="56" rx="5" fill="#C925D1"/>
  <ellipse cx="840" cy="368" rx="13" ry="5" fill="none" stroke="#ffffff" stroke-width="2"/>
  <path d="M 827 368 v 22 a 13 5 0 0 0 26 0 v -22 M 827 379 a 13 5 0 0 0 26 0" fill="none" stroke="#ffffff" stroke-width="2"/>
  <text x="840" y="424" text-anchor="middle" font-size="11" font-weight="bold" fill="#232f3e">DynamoDB</text>
  <text x="840" y="438" text-anchor="middle" font-size="9.5" fill="#555">cinemax-users · PK: email</text>

  <!-- DynamoDB bookmarks -->
  <rect x="812" y="532" width="56" height="56" rx="5" fill="#C925D1"/>
  <ellipse cx="840" cy="548" rx="13" ry="5" fill="none" stroke="#ffffff" stroke-width="2"/>
  <path d="M 827 548 v 22 a 13 5 0 0 0 26 0 v -22 M 827 559 a 13 5 0 0 0 26 0" fill="none" stroke="#ffffff" stroke-width="2"/>
  <text x="840" y="604" text-anchor="middle" font-size="11" font-weight="bold" fill="#232f3e">DynamoDB</text>
  <text x="840" y="618" text-anchor="middle" font-size="9.5" fill="#555">cinemax-bookmarks · userId+movieId</text>

  <!-- S3 -->
  <rect x="292" y="532" width="56" height="56" rx="5" fill="#7AA116"/>
  <path d="M 308 548 a 12 4.5 0 0 0 24 0 a 12 4.5 0 0 0 -24 0 m 0 0 l 3 26 a 9 3.5 0 0 0 18 0 l 3 -26" fill="none" stroke="#ffffff" stroke-width="2"/>
  <text x="320" y="604" text-anchor="middle" font-size="11" font-weight="bold" fill="#232f3e">Amazon S3</text>
  <text x="320" y="618" text-anchor="middle" font-size="9.5" fill="#555">cinemax-posters · public: posters/*</text>

  <!-- CloudWatch -->
  <rect x="1022" y="532" width="56" height="56" rx="5" fill="#E7157B"/>
  <circle cx="1050" cy="560" r="14" fill="none" stroke="#ffffff" stroke-width="2"/>
  <path d="M 1050 552 v 8 l 6 4" stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round"/>
  <text x="1050" y="604" text-anchor="middle" font-size="11" font-weight="bold" fill="#232f3e">CloudWatch</text>
  <text x="1050" y="618" text-anchor="middle" font-size="9.5" fill="#555">logs · 5XX alarm</text>

  <!-- Gmail (external) -->
  <rect x="542" y="717" width="56" height="56" rx="5" fill="#ffffff" stroke="#D93025" stroke-width="2"/>
  <path d="M 554 733 h 32 v 24 h -32 z M 554 733 l 16 13 l 16 -13" fill="none" stroke="#D93025" stroke-width="2" stroke-linejoin="round"/>
  <text x="570" y="789" text-anchor="middle" font-size="11" font-weight="bold" fill="#232f3e">Gmail SMTP</text>
  <text x="570" y="803" text-anchor="middle" font-size="9.5" fill="#555">OTP emails (external)</text>

  <!-- Arrows -->
  <!-- clients -> apigw -->
  <line x1="135" y1="380" x2="287" y2="380" stroke="#232f3e" stroke-width="1.4" marker-end="url(#ah)"/>
  <text x="211" y="371" text-anchor="middle" font-size="9.5" fill="#555">HTTPS / JSON</text>

  <!-- apigw -> lambdas -->
  <path d="M 348 366 L 537 196" stroke="#232f3e" stroke-width="1.4" fill="none" marker-end="url(#ah)"/>
  <text x="436" y="270" text-anchor="middle" font-size="9.5" fill="#555">/api/movies/*</text>
  <line x1="348" y1="380" x2="537" y2="380" stroke="#232f3e" stroke-width="1.4" marker-end="url(#ah)"/>
  <text x="442" y="371" text-anchor="middle" font-size="9.5" fill="#555">/api/auth/*</text>
  <path d="M 348 394 L 537 564" stroke="#232f3e" stroke-width="1.4" fill="none" marker-end="url(#ah)"/>
  <text x="436" y="500" text-anchor="middle" font-size="9.5" fill="#555">/users/.../bookmarks</text>

  <!-- lambdas -> dynamodb -->
  <line x1="598" y1="190" x2="807" y2="190" stroke="#232f3e" stroke-width="1.4" marker-end="url(#ah)"/>
  <line x1="598" y1="380" x2="807" y2="380" stroke="#232f3e" stroke-width="1.4" marker-end="url(#ah)"/>
  <line x1="598" y1="560" x2="807" y2="560" stroke="#232f3e" stroke-width="1.4" marker-end="url(#ah)"/>

  <!-- clients -> s3 (posters) -->
  <polyline points="80,408 80,505 230,505" fill="none" stroke="#7AA116" stroke-width="1.4" stroke-dasharray="5 3"/>
  <polyline points="230,505 287,548" fill="none" stroke="#7AA116" stroke-width="1.4" stroke-dasharray="5 3" marker-end="url(#ahg)"/>
  <text x="160" y="496" text-anchor="middle" font-size="9.5" fill="#7AA116">GET posters</text>

  <!-- lambdas -> cloudwatch (logs) -->
  <polyline points="570,640 570,668 1050,668 1050,593" fill="none" stroke="#E7157B" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#ahp)"/>
  <text x="810" y="662" text-anchor="middle" font-size="9.5" fill="#E7157B">logs · metrics from all functions</text>

  <!-- auth -> gmail -->
  <polyline points="542,380 460,380 460,745 537,745" fill="none" stroke="#D93025" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#ahr)"/>
  <text x="452" y="580" text-anchor="end" font-size="9.5" fill="#D93025">send OTP</text>
</svg>
